<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="output.css">

</head>

<body>
    <form action="" id="form"
        class="w-72 h-[500px] mx-auto bg-white shadow-[var(--shadow-3xl)] mt-8 p-6 rounded-[20px]">
        <h1 class="text-3xl mb-5 p-2">Register Form</h1>
        <div class="relative w-60 mt-6">
            <label for="name" class="block">Username:</label>
            <input type="text" id="name" placeholder="Enter your name"
                class=" rounded-[5px] p-2 w-full absolute top-6 left-0 border border-[#777]">
            <small class="text-[#e74c3c] absolute top-[64px] left-0" id="nahid"></small>
        </div>
        <div class="relative w-60 mt-6">
            <label for="email" class="block mt-14">Email</label>
            <input type="text" id="email" placeholder="Enter your email"
                class="rounded-[5px] p-2 w-full absolute top-6 left-0  border border-[#777]">
            <small class="text-[#e74c3c] absolute left-0 top-[64px] " id="nahid1"></small>
        </div>
        <div class="relative w-60 mt-6">
            <label for="password" class="block mt-14">Password</label>
            <input type="password" id="password" placeholder="Enter your password"
                class="rounded-[5px] absolute top-2 left-0 p-2 w-full border border-[#777] mt-5">
                 <i class="bi bi-eye-slash absolute right-3 top-[38px] cursor-pointer" id="toggle">
            </i>
            <small class="text-[#e74c3c] absolute left-0 top-[70px] " id="nahid2"></small>
        </div>
        <div class="relative w-60 mt-6">
            <label for="password" class="block mt-16">Confirm Password</label>
            <input type="password" id="password2" placeholder="Enter your password"
                class="absolute top-6 left-0 w-full p-2 rounded-[5px] border border-[#777]">
            <i class="bi bi-eye-slash absolute right-3 top-[34px] cursor-pointer" id="togglePassword">
            </i>

            <small id="nahid3" class="absolute left-0 top-[60px] text-[#e74c3c]">
            </small>

        </div>


        <button id="btn" class="border mt-18 w-52 text-white p-1 ml-5 mb-8 rounded-[5px] bg-[#2e86de]">submit</button>
    </form>

    <script src="nahid.js"></script>
</body>

</html>
